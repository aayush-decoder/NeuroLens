<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: sans-serif; width: 260px; padding: 16px; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    input, select { width: 100%; padding: 6px 8px; font-size: 13px;
      border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; }
    button { width: 100%; padding: 8px; background: #4CAF50; color: #fff;
      border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button:hover { background: #43A047; }
    #status { font-size: 11px; color: #888; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <label>Gemini API Key</label>
  <input type="password" id="apiKey" placeholder="AIzaSy...">
  <label>Second language (ESL support)</label>
  <select id="language">
    <option value="">None</option>
    <option value="Spanish">Spanish</option>
    <option value="French">French</option>
    <option value="Hindi">Hindi</option>
    <option value="Portuguese">Portuguese</option>
  </select>
  <button id="activate">Activate Reader</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
